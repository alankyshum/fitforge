name: Scheduled Release

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    name: Check for new commits & release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep '^v' | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Check for new commits since last tag
        id: check_commits
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No existing tags — will create initial release"
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            echo "commit_count=initial" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(git rev-list "$TAG"..HEAD --count)
            echo "Commits since $TAG: $COUNT"
            echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
            if [ "$COUNT" -gt 0 ]; then
              echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Exit if no new commits
        if: steps.check_commits.outputs.has_new_commits != 'true'
        run: |
          echo "No new commits since ${{ steps.latest_tag.outputs.tag }}. Skipping release."
          exit 0

      - name: Compute next version
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: next_version
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          if [ -z "$TAG" ]; then
            NEXT="0.1.0"
          else
            VERSION="${TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Compute next version code
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: next_vcode
        run: |
          CURRENT=$(grep 'CurrentVersionCode:' fdroid/metadata/com.anomalyco.fitforge.yml | awk '{print $2}')
          NEXT=$((CURRENT + 1))
          echo "version_code=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version code: $NEXT"

      - name: Bump version in package.json
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Bump version in app.config.ts
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          sed -i "s/version: \"[^\"]*\"/version: \"$VERSION\"/" app.config.ts

      - name: Bump version in F-Droid metadata
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          VCODE="${{ steps.next_vcode.outputs.version_code }}"
          sed -i "s/CurrentVersion: .*/CurrentVersion: $VERSION/" fdroid/metadata/com.anomalyco.fitforge.yml
          sed -i "s/CurrentVersionCode: .*/CurrentVersionCode: $VCODE/" fdroid/metadata/com.anomalyco.fitforge.yml

      - name: Generate release notes
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: release_notes
        run: |
          TAG="${{ steps.latest_tag.outputs.tag }}"
          VERSION="${{ steps.next_version.outputs.version }}"
          {
            echo 'notes<<NOTES_EOF'
            echo "## What's New"
            echo ""
            if [ -z "$TAG" ]; then
              git log --oneline | head -20
            else
              git log --oneline "$TAG"..HEAD
            fi
            echo ""
            echo "## Install"
            echo ""
            echo "Add the F-Droid repo URL to your F-Droid client:"
            echo '```'
            echo "https://alankyshum.github.io/fitforge/repo"
            echo '```'
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Commit, tag, and push
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json app.config.ts fdroid/metadata/com.anomalyco.fitforge.yml
          git commit -m "release: v$VERSION"
          git tag -a "v$VERSION" -m "v$VERSION (automated release)"
          git push origin main
          git push origin "v$VERSION"

      - name: Create GitHub Release
        if: steps.check_commits.outputs.has_new_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.next_version.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes "${{ steps.release_notes.outputs.notes }}"
